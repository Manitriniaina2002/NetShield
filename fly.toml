# Fly.io configuration for NetShield backend
# Learn more at https://fly.io/docs/reference/configuration/

app = "netshield-backend"
primary_region = "iad"

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["gcr.io/buildpacks/python"]

[env]
  SIMULATION_MODE = "false"
  DEBUG = "false"
  LOG_LEVEL = "INFO"
  COMPANY_NAME = "NetShield"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    interval = 10000
    timeout = 5000
    grace_period = "5s"
    method = "GET"
    path = "/api/health"

[deploy]
  release_command = "echo 'Ready to go!'"
